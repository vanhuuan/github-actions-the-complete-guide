name: test 02 starting project
on: 
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: install dependencies
        working-directory: "02 Starting Project"
        run: npm ci

      - name: run lint
        working-directory: "02 Starting Project"
        run: npm run lint

      - name: Run test
        working-directory: "02 Starting Project"
        run: npm test
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: install dependencies
        working-directory: "02 Starting Project"
        run: npm ci

      - name: Run build
        working-directory: "02 Starting Project"
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Deploy
        run: echo "Deploying application"