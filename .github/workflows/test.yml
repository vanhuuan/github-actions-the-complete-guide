name: test 02 starting project
on: 
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: install dependencies
        run: |
          cd "02 Starting Project"
          npm ci

      - name: Run test
        run: npm test