name: test 02 starting project
on: 
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: install dependencies
        working-directory: "02 Starting Project"
        run: npm ci

      - name: Run test
        working-directory: "02 Starting Project"
        run: npm test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish-js.outputs.script-file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: install dependencies
        working-directory: "02 Starting Project"
        run: npm ci

      - name: Run build
        working-directory: "02 Starting Project"
        run: npm run build

      - name: publish js filename
        id: publish-js
        working-directory: "02 Starting Project"
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: "02 Starting Project/dist"
          # path: |
          #   "02 Starting Project/dist"
          #   package.json

  deploy:
    needs: build  
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist-files
      
      - name: Output contents of dist folder
        run: ls

      - name: Output script file name
        run: echo "Script file name ${{ needs.build.outputs.script-file }}"

      - name: Deploy
        run: echo "Deploying application"